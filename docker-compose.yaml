version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --skip-name-resolve
    environment:
      MYSQL_DATABASE: Caerus
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: Caerus
      MYSQL_PASSWORD: Caerus-db-01
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d

  sessions-handler:
    image: redis:alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: ./docker/app/Dockerfile
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: Caerus
      DB_USERNAME: Caerus
      DB_PASSWORD: Caerus-db-01

      SESSION_DRIVER: redis
      CACHE_STORE: redis
      REDIS_HOST: sessions-handler
      REDIS_PASSWORD: null
      REDIS_PORT: 6379

  web:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    ports:
      - "8000:80"
    depends_on:
      - app

volumes:
  db_data: