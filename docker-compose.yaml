version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --skip-name-resolve
    environment:
      MYSQL_DATABASE: Caerus
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: Caerus
      MYSQL_PASSWORD: Caerus-db-01
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d

  sessions-handler:
    image: redis:alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: ./docker/app/Dockerfile
    depends_on:
      - db
    environment:
      APP_KEY: "base64:xFjKsRVOdKzb+zn2ILmi9FCM2x3i52a4J/xEKlwqnjs="

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: Caerus
      DB_USERNAME: Caerus
      DB_PASSWORD: Caerus-db-01

      SESSION_DRIVER: redis
      CACHE_STORE: redis
      REDIS_HOST: sessions-handler
      REDIS_PASSWORD: null
      REDIS_PORT: 6379

      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN}

  web:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    ports:
      - "8000:80"
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:v2.53.2
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - web

  grafana:
    image: grafana/grafana:10.4.5
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  db_data:
  prometheus_data:
  grafana_data: