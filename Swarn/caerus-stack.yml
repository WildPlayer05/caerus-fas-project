# caerus-stack.yml — 4-node Docker Swarm
#
#   caerus-edge  (manager) : web (nginx LB) + redis + prometheus + grafana
#   caerus-db    (worker)  : mysql
#   caerus-app-1 (worker)  : php-fpm
#   caerus-app-2 (worker)  : php-fpm
#
# Deploy:  docker stack deploy -c caerus-stack.yml caerus
# NB: Swarm does NOT build. Build & push caerus-app / caerus-web first (see README).

version: "3.8"

services:

  web:                                   # nginx = load balancer / entry point → edge
    image: registry.example.com/caerus-web:1.0
    ports:
      - target: 80
        published: 8000
        mode: host                       # bind only on the edge node (single entry point)
    networks: [caerus]
    deploy:
      replicas: 1
      placement:
        constraints: ["node.labels.caerus_role == edge"]
      restart_policy: { condition: on-failure }

  sessions-handler:                      # redis → edge
    image: redis:alpine
    networks: [caerus]
    deploy:
      replicas: 1
      placement:
        constraints: ["node.labels.caerus_role == edge"]
      restart_policy: { condition: on-failure }

  app:                                   # php-fpm → app-1 + app-2
    image: registry.example.com/caerus-app:1.0
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: Caerus
      DB_USERNAME: Caerus
      DB_PASSWORD: Caerus-db-01          # plain env (your app image doesn't read *_FILE)
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      REDIS_HOST: sessions-handler
      REDIS_PORT: 6379
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
    networks: [caerus]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      placement:
        constraints: ["node.labels.caerus_role == app"]
        max_replicas_per_node: 1         # exactly one app per app-VM
      update_config: { parallelism: 1, order: start-first }
      restart_policy: { condition: on-failure }

  db:                                    # mysql → db node
    image: mysql:8.0
    command: --skip-name-resolve
    environment:
      MYSQL_DATABASE: Caerus
      MYSQL_USER: Caerus
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets: [db_root_password, db_password]
    volumes:
      - db_data:/var/lib/mysql
      - /opt/caerus/mysql:/docker-entrypoint-initdb.d:ro   # init SQL, copied here by Ansible
    networks: [caerus]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: ["node.labels.caerus_role == db"]
      restart_policy: { condition: on-failure }

  prometheus:                            # → edge
    image: prom/prometheus:v2.53.2
    volumes:
      - /opt/caerus/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports: ["9090:9090"]
    networks: [caerus]
    deploy:
      replicas: 1
      placement:
        constraints: ["node.labels.caerus_role == edge"]
      restart_policy: { condition: on-failure }

  grafana:                               # → edge
    image: grafana/grafana:10.4.5
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - /opt/caerus/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports: ["3000:3000"]
    networks: [caerus]
    deploy:
      replicas: 1
      placement:
        constraints: ["node.labels.caerus_role == edge"]
      restart_policy: { condition: on-failure }

networks:
  caerus:
    driver: overlay                      # multi-host internal network

volumes:
  db_data:
  prometheus_data:
  grafana_data:

secrets:
  db_root_password:
    external: true
  db_password:
    external: true
